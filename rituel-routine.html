<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rituel · Chapter 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200;0,300;0,400;0,500;1,200;1,300;1,400;1,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --brown:       #2C2418;
  --brown-mid:   #3D2E1A;
  --brown-deep:  #3D2E1A;
  --cream:       #E8D9C0;
  --cream-light: #F5EFE4;
  --cream-pale:  #FAF7F2;
  --gold:        #B8965A;
  --gold-light:  #D4AE78;
  --gold-pale:   #F2EAD8;
  --body:        #2C2312;
  --note:        #8B6F47;
  --mist:        #B8A898;
  --rule:        rgba(184,150,90,.2);
  --shadow:      rgba(44,35,18,.12);
}

body {
  font-family: "Plus Jakarta Sans", -apple-system, "Segoe UI", sans-serif;
  background: var(--cream-pale);
  color: var(--body);
  min-height: 100vh;
}

/* ── Header ── */
header {
  background: var(--brown);
  padding: 32px 40px 28px;
  position: relative;
  overflow: hidden;
}
header::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.header-inner { position: relative; display: flex; align-items: center; gap: 20px; }
.header-icon {
  width: 44px; height: 44px; flex-shrink: 0;
  opacity: .9;
}
.header-eyebrow {
  font-size: .58rem; letter-spacing: .22em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 6px; font-weight: 400;
}
header h1 { font-size: 2.2rem; font-weight: 500; color: var(--cream); letter-spacing: .03em; line-height: 1; }
header p {
  font-size: .65rem; color: rgba(255,255,255,.3);
  margin-top: 6px; letter-spacing: .14em; text-transform: uppercase;
}

/* ── Sync bar ── */
.sync-bar {
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 10px;
  padding: 8px 40px;
  background: var(--brown-mid);
  border-bottom: 1px solid rgba(184,150,90,.12);
  font-size: .7rem;
}
.sync-status { display: flex; align-items: center; gap: 8px; color: rgba(255,255,255,.35); }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,.18); flex-shrink: 0; transition: background .3s;
}
.sync-dot.connected { background: #5aab7a; }
.sync-dot.saving    { background: var(--gold); animation: pulse .8s infinite; }
.sync-dot.error     { background: #b05050; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.sync-actions { display: flex; gap: 8px; }
.btn-sync {
  font-family: inherit; font-size: .62rem; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 4px 13px; border-radius: 2px;
  border: 1px solid rgba(184,150,90,.35);
  background: transparent; color: var(--gold-light);
  cursor: pointer; transition: all .18s;
}
.btn-sync:hover { border-color: var(--gold); color: var(--gold); }
.btn-sync.primary {
  background: var(--gold); border-color: var(--gold);
  color: var(--brown); font-weight: 500;
}
.btn-sync.primary:hover { background: var(--gold-light); }

/* ── Nav tabs ── */
.tab-bar {
  display: flex; gap: 2px; padding: 0 40px;
  background: white; border-bottom: 1px solid var(--rule);
}
.tab {
  font-family: inherit; font-size: .65rem; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 13px 17px; cursor: pointer;
  border: none; background: none; color: #bbb;
  border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: all .18s;
}
.tab:hover { color: var(--gold); }
.tab.active { color: var(--brown); border-bottom-color: var(--gold); }

/* ── Content ── */
.content { padding: 28px 40px 60px; max-width: 900px; }

/* ── Today card ── */
.today-band {
  background: var(--brown);
  border-radius: 4px 4px 0 0;
  padding: 22px 26px 18px;
  position: relative; overflow: hidden;
}
.today-band::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(184,150,90,.4), transparent);
}
.today-eyebrow {
  font-size: .58rem; letter-spacing: .18em; text-transform: uppercase;
  color: var(--gold); margin-bottom: 8px; font-weight: 400;
}
.today-day {
  font-size: 2.8rem; font-weight: 300; color: var(--cream);
  line-height: 1; letter-spacing: .02em;
}
.today-sub {
  font-size: .78rem; color: var(--gold-light); margin-top: 6px;
  font-style: italic; letter-spacing: .03em;
}
.today-meta {
  display: flex; gap: 20px; margin-top: 14px; flex-wrap: wrap;
}
.today-meta-item {
  display: flex; flex-direction: column; gap: 2px;
}
.today-meta-label {
  font-size: .56rem; letter-spacing: .12em; text-transform: uppercase;
  color: rgba(255,255,255,.3);
}
.today-meta-value {
  font-size: .78rem; color: var(--cream); font-weight: 400;
}

/* ── Routine sections ── */
.routine-card {
  background: white;
  border: 1px solid var(--rule);
  border-top: none;
  box-shadow: 0 4px 16px var(--shadow);
}
.routine-card:last-child { border-radius: 0 0 4px 4px; }

.routine-header {
  padding: 10px 26px;
  border-bottom: 1px solid var(--gold-pale);
  display: flex; align-items: center; justify-content: space-between;
}
.routine-header-label {
  font-size: .62rem; font-weight: 500; letter-spacing: .16em;
  text-transform: uppercase; color: var(--gold);
}
.btn-done {
  font-family: inherit; font-size: .62rem; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 5px 14px; border-radius: 2px;
  border: 1px solid var(--rule);
  background: white; color: var(--mist);
  cursor: pointer; transition: all .18s;
}
.btn-done:hover { border-color: var(--gold); color: var(--body); }
.btn-done.logged {
  background: var(--gold-pale); border-color: var(--gold);
  color: var(--note);
}

.step-list { padding: 8px 0; }
.step-row {
  display: flex; align-items: baseline; gap: 12px;
  padding: 9px 26px;
  border-bottom: 1px solid rgba(242,234,216,.6);
  transition: background .12s;
}
.step-row:last-child { border-bottom: none; }
.step-row:hover { background: var(--cream-pale); }
.step-num {
  font-size: .7rem; color: var(--gold); min-width: 18px;
  text-align: right; flex-shrink: 0; font-weight: 500;
}
.step-product {
  font-size: .84rem; font-weight: 500; color: var(--body); flex: 1;
}
.step-note {
  font-size: .74rem; color: var(--note); font-style: italic;
  margin-top: 1px;
}
.step-inline-note {
  font-size: .74rem; color: var(--gold); font-style: italic; margin-left: 6px;
}
.step-depleted .step-product { color: var(--mist); text-decoration: line-through; }
.step-depleted .step-note,
.step-depleted .step-inline-note { color: #ccc; }

.hand-care-row {
  display: flex; align-items: baseline; gap: 10px;
  padding: 10px 26px 12px;
  border-top: 1px solid var(--rule);
  margin-top: 2px;
}
.hand-care-label {
  font-size: .68rem; color: var(--note); flex-shrink: 0;
}
.hand-care-value {
  font-size: .75rem; color: var(--note); font-style: italic;
}

/* ── Week banner ── */
.week-banner {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 16px; margin-bottom: 18px;
  background: white; border: 1px solid var(--rule);
  border-radius: 3px; box-shadow: 0 2px 8px var(--shadow);
  font-size: .74rem; color: var(--note);
}
.week-badge {
  font-size: .6rem; font-weight: 500; letter-spacing: .08em;
  text-transform: uppercase; padding: 3px 10px;
  border-radius: 2px; background: var(--gold-pale);
  color: var(--note); flex-shrink: 0;
}
.week-badge.peel { background: var(--brown); color: var(--gold-light); }

/* ── Cycle setup ── */
.setup-card {
  background: white; border: 1px solid var(--rule);
  border-radius: 3px; padding: 22px 26px;
  box-shadow: 0 2px 8px var(--shadow); margin-bottom: 18px;
}
.setup-title {
  font-size: .65rem; font-weight: 500; letter-spacing: .12em;
  text-transform: uppercase; color: var(--mist); margin-bottom: 12px;
}
.setup-body { font-size: .84rem; color: var(--note); line-height: 1.7; margin-bottom: 14px; }
.form-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.form-label { font-size: .6rem; text-transform: uppercase; letter-spacing: .1em; color: var(--mist); }
.form-row input, .form-row select, .form-row textarea {
  font-family: inherit; font-size: .82rem;
  padding: 7px 10px; border: 1px solid var(--rule);
  border-radius: 2px; background: var(--cream-pale);
  color: var(--body); outline: none; transition: border-color .18s;
}
.form-row input:focus, .form-row select:focus, .form-row textarea:focus {
  border-color: var(--gold); background: white;
}
.form-row textarea { resize: vertical; min-height: 72px; }
.btn-primary {
  font-family: inherit; font-size: .68rem; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 8px 18px; border-radius: 2px;
  border: none; background: var(--brown);
  color: var(--gold-light); cursor: pointer; transition: all .18s;
}
.btn-primary:hover { background: var(--brown-deep); }
.btn-secondary {
  font-family: inherit; font-size: .68rem; font-weight: 400;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 8px 16px; border-radius: 2px;
  border: 1px solid var(--rule); background: white;
  color: var(--mist); cursor: pointer; transition: all .18s;
}
.btn-secondary:hover { border-color: var(--gold); color: var(--body); }

/* ── Metrics ── */
.metrics {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 12px; margin-bottom: 20px;
}
.metric {
  background: white; border: 1px solid var(--rule);
  border-radius: 3px; padding: 14px 18px;
  box-shadow: 0 2px 8px var(--shadow);
}
.metric-label {
  font-size: .58rem; text-transform: uppercase; letter-spacing: .1em;
  color: var(--mist); margin-bottom: 5px;
}
.metric-value {
  font-size: 1.9rem; font-weight: 300; color: var(--brown); line-height: 1;
}
.metric-sub { font-size: .7rem; color: var(--note); margin-top: 3px; font-style: italic; }

/* ── Products tab ── */
.product-section { margin-bottom: 24px; }
.product-section-title {
  font-size: .6rem; font-weight: 500; letter-spacing: .16em;
  text-transform: uppercase; color: var(--mist);
  padding-bottom: 8px; margin-bottom: 12px;
  border-bottom: 1px solid var(--rule);
}
.product-table-wrap {
  background: white; border: 1px solid var(--rule);
  border-radius: 3px; overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}
table { width: 100%; border-collapse: collapse; font-size: .8rem; }
th {
  text-align: left; padding: 9px 14px;
  font-size: .58rem; font-weight: 500; letter-spacing: .1em;
  text-transform: uppercase; color: var(--mist);
  background: var(--cream-pale); border-bottom: 1px solid var(--rule);
}
td {
  padding: 10px 14px; border-bottom: 1px solid var(--gold-pale);
  vertical-align: middle; color: var(--body);
}
tr:last-child td { border-bottom: none; }
.badge {
  display: inline-block; font-size: .58rem; font-weight: 500;
  letter-spacing: .06em; text-transform: uppercase;
  padding: 3px 8px; border-radius: 2px;
}
.b-active    { background: var(--gold-pale); color: var(--note); }
.b-depleting { background: #fef6e4; color: #9a6f20; }
.b-depleted  { background: #f0ece8; color: #aaa; }
.toggle-btn {
  font-family: inherit; font-size: .6rem; font-weight: 500;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 3px 10px; border-radius: 2px;
  border: 1px solid var(--rule); background: white;
  color: var(--mist); cursor: pointer; transition: all .15s;
}
.toggle-btn:hover { border-color: var(--gold); color: var(--body); }

/* ── Log tab ── */
.log-entry {
  background: white; border: 1px solid var(--rule);
  border-radius: 3px; padding: 16px 20px;
  margin-bottom: 10px; box-shadow: 0 2px 8px var(--shadow);
}
.log-date { font-size: .68rem; color: var(--mist); margin-bottom: 4px; }
.log-meta {
  font-size: .72rem; color: var(--gold); margin-bottom: 8px;
  letter-spacing: .03em;
}
.log-note { font-size: .82rem; line-height: 1.75; color: var(--body); }
.log-badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.log-btn-row { display: flex; gap: 8px; margin-top: 12px; }
.btn-small {
  font-family: inherit; font-size: .6rem; font-weight: 500;
  letter-spacing: .08em; text-transform: uppercase;
  padding: 4px 11px; border-radius: 2px;
  border: 1px solid var(--rule); background: white;
  color: var(--mist); cursor: pointer; transition: all .15s;
}
.btn-small:hover { border-color: var(--gold); color: var(--body); }
.btn-small.danger { color: #a03030; border-color: #e0c0c0; }
.btn-small.danger:hover { background: #fff0ee; border-color: #b05050; }
.empty-state {
  font-style: italic; color: var(--mist); font-size: .9rem;
  padding: 2rem 0; text-align: center;
}

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(44,35,18,.55);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; padding: 1rem;
}
.modal {
  background: var(--cream-pale); border-top: 3px solid var(--gold);
  border-radius: 3px; padding: 26px;
  width: min(520px, 90vw); max-height: 88vh; overflow-y: auto;
  box-shadow: 0 24px 64px rgba(44,35,18,.35);
  animation: slideUp .2s ease;
}
@keyframes slideUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.modal-title {
  font-size: 1.4rem; font-weight: 300; color: var(--brown);
  margin-bottom: 18px; letter-spacing: .02em;
}
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }

/* ── Retinol alternation chip ── */
.retinol-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--brown); color: var(--gold-light);
  font-size: .62rem; letter-spacing: .08em; text-transform: uppercase;
  padding: 4px 12px; border-radius: 2px; margin-left: 8px;
  font-weight: 500;
}

/* ── Controls row ── */
.controls {
  display: flex; gap: 8px; margin-bottom: 14px;
  align-items: center; flex-wrap: wrap;
}
.search-wrap { position: relative; flex: 1; min-width: 160px; }
.search-wrap input {
  width: 100%; padding: 6px 10px 6px 30px;
  border: 1px solid var(--rule); border-radius: 2px;
  font-family: inherit; font-size: .78rem;
  color: var(--body); outline: none; transition: border-color .18s;
  background: var(--cream-pale);
}
.search-wrap input:focus { border-color: var(--gold); background: white; }
.search-wrap svg {
  position: absolute; left: 9px; top: 50%;
  transform: translateY(-50%); color: #bbb; pointer-events: none;
}

/* ── Cycle wheel ── */
.cycle-row {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 6px; margin-bottom: 18px;
}
.cycle-day {
  background: white; border: 1px solid var(--rule);
  border-radius: 3px; padding: 10px 6px 8px;
  text-align: center; box-shadow: 0 1px 4px var(--shadow);
  transition: all .15s;
}
.cycle-day.today {
  background: var(--brown); border-color: var(--brown);
}
.cycle-day.peel-week { border-top: 3px solid var(--gold); }
.cycle-day-name {
  font-size: .58rem; letter-spacing: .1em; text-transform: uppercase;
  color: var(--mist); margin-bottom: 5px;
}
.cycle-day.today .cycle-day-name { color: var(--gold); }
.cycle-day-type {
  font-size: .72rem; font-weight: 500; color: var(--body); line-height: 1.2;
}
.cycle-day.today .cycle-day-type { color: var(--cream); }
.cycle-day-sub {
  font-size: .6rem; color: var(--note); margin-top: 2px; font-style: italic;
}
.cycle-day.today .cycle-day-sub { color: var(--gold-light); }

@media (max-width: 680px) {
  header, .sync-bar, .tab-bar, .content { padding-left: 20px; padding-right: 20px; }
  header { padding-top: 22px; padding-bottom: 18px; }
  header h1 { font-size: 1.8rem; }
  .metrics { grid-template-columns: 1fr 1fr; }
  .cycle-row { grid-template-columns: repeat(4, 1fr); }
  .today-day { font-size: 2.2rem; }
}
</style>
<script>
// ── App icon — generates apple-touch-icon + favicon at runtime ────────────────
(function() {
  function buildIcon(size) {
    const c = document.createElement('canvas');
    c.width = c.height = size;
    const ctx = c.getContext('2d');
    const r = size * 0.22; // corner radius

    // Background — dark brown rounded square
    ctx.beginPath();
    ctx.moveTo(r, 0); ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size); ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r); ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = '#2C2418';
    ctx.fill();

    // Sweeping background curves
    ctx.save();
    ctx.beginPath(); ctx.moveTo(-size*.1, size*.7); ctx.bezierCurveTo(size*.3,size*.3,size*.8,size*.55,size*1.1,size*.2);
    ctx.strokeStyle = 'rgba(184,150,90,.12)'; ctx.lineWidth = size*.012; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-size*.1, size*.45); ctx.bezierCurveTo(size*.4,size*.1,size*.9,size*.4,size*1.1,size*.15);
    ctx.strokeStyle = 'rgba(184,150,90,.07)'; ctx.lineWidth = size*.009; ctx.stroke();
    ctx.restore();

    // Draw eyedropper — upright, centered
    // viewBox 0 0 28 82, rendered at ~40% of canvas height, centered
    const sc = size / 180;  // scale factor relative to 180px design
    const ox = size * 0.5;  // center x
    const oy = size * 0.12; // top offset

    function px(x) { return ox + (x - 14) * sc * 4.5; }
    function py(y) { return oy + y * sc * 4.5; }

    const brass   = '#B8965A';
    const brassL  = '#D4AE78';
    const hilight = '#F5F0E8';

    // Capsule bulb
    ctx.beginPath();
    const bx = px(8), bw = 12*sc*4.5, bh = 20*sc*4.5, brad = 6*sc*4.5;
    ctx.roundRect(bx, py(2), bw, bh, brad);
    ctx.fillStyle = brass; ctx.globalAlpha = 0.92; ctx.fill();
    // Bulb highlight
    ctx.beginPath(); ctx.roundRect(px(9.5), py(3.5), 4*sc*4.5, 14*sc*4.5, 2*sc*4.5);
    ctx.fillStyle = brassL; ctx.globalAlpha = 0.28; ctx.fill();

    // Collar flange
    ctx.beginPath(); ctx.roundRect(px(5), py(21), 18*sc*4.5, 4*sc*4.5, 2*sc*4.5);
    ctx.fillStyle = brass; ctx.globalAlpha = 0.88; ctx.fill();

    // Barrel fill
    ctx.beginPath(); ctx.roundRect(px(10.5), py(25), 7*sc*4.5, 25*sc*4.5, 1*sc*4.5);
    ctx.fillStyle = brassL; ctx.globalAlpha = 0.16; ctx.fill();
    // Barrel stroke
    ctx.beginPath(); ctx.roundRect(px(10.5), py(25), 7*sc*4.5, 25*sc*4.5, 1*sc*4.5);
    ctx.strokeStyle = brass; ctx.lineWidth = 1.2*sc*4.5; ctx.globalAlpha = 0.8; ctx.stroke();

    // Liquid level
    ctx.beginPath(); ctx.roundRect(px(11.5), py(32), 5*sc*4.5, 17*sc*4.5, 0.5*sc*4.5);
    ctx.fillStyle = brass; ctx.globalAlpha = 0.42; ctx.fill();

    // Glass highlight line
    ctx.beginPath(); ctx.moveTo(px(12.2), py(27)); ctx.lineTo(px(12.2), py(48));
    ctx.strokeStyle = hilight; ctx.lineWidth = 0.8*sc*4.5; ctx.globalAlpha = 0.28; ctx.stroke();

    // Tip knob fill
    ctx.beginPath(); ctx.roundRect(px(9.5), py(50), 9*sc*4.5, 5*sc*4.5, 1.5*sc*4.5);
    ctx.fillStyle = brassL; ctx.globalAlpha = 0.5; ctx.fill();
    // Tip knob stroke
    ctx.beginPath(); ctx.roundRect(px(9.5), py(50), 9*sc*4.5, 5*sc*4.5, 1.5*sc*4.5);
    ctx.strokeStyle = brass; ctx.lineWidth = 0.9*sc*4.5; ctx.globalAlpha = 0.65; ctx.stroke();

    // Taper
    ctx.beginPath();
    ctx.moveTo(px(11), py(55)); ctx.lineTo(px(17), py(55));
    ctx.lineTo(px(15.2), py(62)); ctx.lineTo(px(12.8), py(62)); ctx.closePath();
    ctx.fillStyle = brassL; ctx.globalAlpha = 0.6; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(px(11), py(55)); ctx.lineTo(px(17), py(55));
    ctx.lineTo(px(15.2), py(62)); ctx.lineTo(px(12.8), py(62)); ctx.closePath();
    ctx.strokeStyle = brass; ctx.lineWidth = 0.8*sc*4.5; ctx.globalAlpha = 0.5; ctx.stroke();

    // Nozzle ring
    ctx.beginPath(); ctx.ellipse(px(14), py(62.5), 2.2*sc*4.5, 1.4*sc*4.5, 0, 0, Math.PI*2);
    ctx.fillStyle = brass; ctx.globalAlpha = 0.88; ctx.fill();

    // Teardrop
    ctx.beginPath();
    ctx.moveTo(px(14), py(65));
    ctx.bezierCurveTo(px(14), py(65), px(9.8), py(72), px(9.8), py(75.5));
    ctx.bezierCurveTo(px(9.8), py(78.5), px(11.7), py(80.5), px(14), py(80.5));
    ctx.bezierCurveTo(px(16.3), py(80.5), px(18.2), py(78.5), px(18.2), py(75.5));
    ctx.bezierCurveTo(px(18.2), py(72), px(14), py(65), px(14), py(65));
    ctx.closePath();
    ctx.fillStyle = brass; ctx.globalAlpha = 0.82; ctx.fill();

    // Drop highlight
    ctx.save();
    ctx.translate(px(12.2), py(74));
    ctx.rotate(-15 * Math.PI / 180);
    ctx.beginPath(); ctx.ellipse(0, 0, 1*sc*4.5, 1.9*sc*4.5, 0, 0, Math.PI*2);
    ctx.fillStyle = hilight; ctx.globalAlpha = 0.28; ctx.fill();
    ctx.restore();

    ctx.globalAlpha = 1;
    return c.toDataURL('image/png');
  }

  window.addEventListener('DOMContentLoaded', function() {
    // Apple touch icon (180×180)
    const link180 = document.createElement('link');

})();
</script>

    const text = await res.text();

function getCycleInfo(date) {
  if (!settings.cycleStartDate) return null;
  const start = new Date(settings.cycleStartDate + 'T00:00:00');
  const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
  const daysDiff = Math.round((d - start) / 86400000);
  if (daysDiff < 0) return null;
  const cycleDay = daysDiff % 28;           // 0–27 within 4-week cycle
  const weekNum  = Math.floor(cycleDay / 7) + 1; // 1–4
  const isPeel   = weekNum === 1 || weekNum === 3;
  const dayOfWeek = d.getDay(); // 0=Sun
  const routine  = isPeel ? ROUTINES.peel[dayOfWeek] : ROUTINES.nopeel[dayOfWeek];
  return { weekNum, isPeel, routine, dayOfWeek, cycleDay };
}

// ── Render helpers ────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function uid() { return '_' + Math.random().toString(36).slice(2,9); }

function renderStepList(steps) {
  return steps.map(s => `
    <div class="step-row${s.depleted ? ' step-depleted' : ''}">
      <span class="step-num">${s.num}</span>
      <div>
        <span class="step-product">${esc(s.product)}</span>${s.inlineNote ? `<span class="step-inline-note">${esc(s.inlineNote)}</span>` : ''}
        ${s.note ? `<div class="step-note">${esc(s.note)}</div>` : ''}
        ${s.depleted ? `<div class="step-note">depleted — discontinued</div>` : ''}
      </div>
    </div>`).join('');
}

function isLoggedToday(session) {
  const today = formatDateShort(todayDate());
  return log.some(e => e.date === today && e.session === session);
}

// ── Tab: Today ────────────────────────────────────────────────────────────────
function renderToday() {
  const today = todayDate();
  const dayName = DAYS[today.getDay()];
  const cycleInfo = getCycleInfo(today);
  const el = document.getElementById('tab-content');

  if (!settings.cycleStartDate) {
    el.innerHTML = `
      <div class="setup-card">
        <div class="setup-title">Set your cycle start date</div>
        <div class="setup-body">To show the correct evening routine each night, set the date of your most recent Week 1 Monday. This anchors the 4-week rotating cycle.</div>
        <div class="form-row">
          <div class="form-label">Week 1 Monday — most recent</div>
          <input type="date" id="cycle-start-input">
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn-primary" onclick="saveCycleStart()">Set cycle start</button>
        </div>
      </div>`;
    return;
  }

  const ci = cycleInfo;
  const routineType = ci ? normalizeType(ci.routine) : null;
  const eveningLabel = ci ? ci.routine.label : 'Evening Routine';
  const eveningSteps = routineType ? getEveningSteps(routineType) : [];
  const handCare = routineType ? getHandCare(routineType) : 'Nécessaire Hand Cream';
  const morningLogged = isLoggedToday('morning');
  const eveningLogged = isLoggedToday('evening');
  const isPeel = ci?.isPeel;

  el.innerHTML = `
    ${ci ? `<div class="week-banner">
      <span class="week-badge${isPeel ? ' peel' : ''}">Week ${ci.weekNum} of 4${isPeel ? ' — Peel Week' : ''}</span>
      <span>${formatDate(today)}</span>
      ${ci.routine.type === 'Retinol' && !granactiveDepleted() ? `<span style="margin-left:auto">Tonight: <strong>${settings.retinolNext === 'retinol' ? 'Retinol 0.5%' : 'Granactive Retinoid 2%'}</strong></span>` : ''}
    </div>` : ''}

    <div class="today-band">
      <div class="today-eyebrow">T O D A Y</div>
      <div class="today-day">${dayName}</div>
      <div class="today-sub">${eveningLabel}</div>
      ${ci ? `<div class="today-meta">
        <div class="today-meta-item">
          <span class="today-meta-label">Cycle week</span>
          <span class="today-meta-value">${ci.weekNum} / 4</span>
        </div>
        <div class="today-meta-item">
          <span class="today-meta-label">Week type</span>
          <span class="today-meta-value">${isPeel ? 'Peel' : 'No Peel'}</span>
        </div>
        <div class="today-meta-item">
          <span class="today-meta-label">Routine</span>
          <span class="today-meta-value">${ci.routine.sub}</span>
        </div>
      </div>` : ''}
    </div>

    <div class="routine-card">
      <div class="routine-header">
        <span class="routine-header-label">M &nbsp; O &nbsp; R &nbsp; N &nbsp; I &nbsp; N &nbsp; G</span>
        <button class="btn-done${morningLogged ? ' logged' : ''}" onclick="logSession('morning', '${esc(eveningLabel)}')">${morningLogged ? '✓ Logged' : 'Mark done'}</button>
      </div>
      <div class="step-list">${renderStepList(getMorningSteps())}</div>
    </div>

    <div class="routine-card" style="margin-top:1px">
      <div class="routine-header">
        <span class="routine-header-label">E &nbsp; V &nbsp; E &nbsp; N &nbsp; I &nbsp; N &nbsp; G &nbsp; — &nbsp; ${esc(eveningLabel.toUpperCase())}</span>
        <button class="btn-done${eveningLogged ? ' logged' : ''}" onclick="logSession('evening', '${esc(eveningLabel)}')">${eveningLogged ? '✓ Logged' : 'Mark done'}</button>
      </div>
      <div class="step-list">${renderStepList(eveningSteps)}</div>
      <div class="hand-care-row">
        <span class="hand-care-label">Hand care</span>
        <span class="hand-care-value">${esc(handCare)}</span>
      </div>
    </div>`;
}

function saveCycleStart() {
  const val = document.getElementById('cycle-start-input').value;
  if (!val) { alert('Please select a date.'); return; }
  settings.cycleStartDate = val;
  scheduleSave(); render();
}

function logSession(session, routineLabel) {
  if (isLoggedToday(session)) return;
  const today = formatDateShort(todayDate());
  // Advance retinol alternation when evening retinol logged
  if (session === 'evening' && routineLabel.includes('Retinol')) {
    settings.retinolNext = settings.retinolNext === 'retinol' ? 'granactive' : 'retinol';
  }
  log.unshift({ id: uid(), date: today, session, routine: routineLabel, note: '' });
  scheduleSave(); renderToday();
}

// ── Tab: Cycle ────────────────────────────────────────────────────────────────
function renderCycle() {
  const el = document.getElementById('tab-content');
  const today = todayDate();

  if (!settings.cycleStartDate) {
    el.innerHTML = `
      <div class="setup-card" style="border-left:3px solid var(--gold)">
        <div class="setup-title" style="color:var(--gold)">Cycle start date</div>
        <div class="setup-body">Set the date of your most recent Week 1 Monday to anchor the 4-week rotating cycle.</div>
        <div class="form-row" style="margin-bottom:10px">
          <div class="form-label">Week 1 Monday</div>
          <input type="date" id="cycle-adjust-input" value="">
        </div>
        <button class="btn-primary" onclick="adjustCycleStart()">Save</button>
      </div>`;
    return;
  }

  // Show current week + next week
  const ci = getCycleInfo(today);
  if (!ci) {
    el.innerHTML = `
      <div class="setup-card" style="border-left:3px solid var(--gold)">
        <div class="setup-title" style="color:var(--gold)">Cycle start date</div>
        <div class="setup-body">The current start date is in the future. Update it to a past Monday to anchor the cycle correctly.</div>
        <div class="form-row" style="margin-bottom:10px">
          <div class="form-label">Week 1 Monday</div>
          <input type="date" id="cycle-adjust-input" value="${settings.cycleStartDate}">
        </div>
        <button class="btn-primary" onclick="adjustCycleStart()">Update</button>
      </div>`;
    return;
  }

  // Adjust card — rendered at top, prominent
  const adjustCard = `
    <div class="setup-card" style="border-left:3px solid var(--gold);margin-bottom:22px">
      <div class="setup-title" style="color:var(--gold)">Cycle start date</div>
      <div class="form-row" style="margin-bottom:10px">
        <div class="form-label">Week 1 Monday</div>
        <input type="date" id="cycle-adjust-input" value="${settings.cycleStartDate}">
      </div>
      <button class="btn-primary" onclick="adjustCycleStart()">Update</button>
    </div>`;

  // Build 4 weeks ahead view
  const weeks = [];
  for (let w = 0; w < 4; w++) {
    const weekDays = [];
    // Find Monday of this cycle week
    const cycleWeekStart = new Date(settings.cycleStartDate + 'T00:00:00');
    const totalWeekOffset = Math.floor(ci.cycleDay / 7) * 7 + w * 7;
    // Calculate actual offset from current cycle start
    const weeksInCycle = Math.floor(Math.round((today - cycleWeekStart) / 86400000) / 7);
    const baseWeekMonday = new Date(cycleWeekStart);
    baseWeekMonday.setDate(baseWeekMonday.getDate() + (weeksInCycle - Math.floor(ci.cycleDay / 7) + w) * 7);

    for (let d = 0; d < 7; d++) {
      const date = new Date(baseWeekMonday);
      date.setDate(date.getDate() + d);
      const info = getCycleInfo(date);
      weekDays.push({ date, info });
    }
    weeks.push({ weekNum: weekDays[0].info?.weekNum, isPeel: weekDays[0].info?.isPeel, days: weekDays });
  }

  const retinolStatus = granactiveDepleted()
    ? '<span style="color:var(--note);font-style:italic">Granactive depleted — using Retinol 0.5% only</span>'
    : `Next retinol night: <strong>${settings.retinolNext === 'retinol' ? 'Retinol 0.5%' : 'Granactive Retinoid 2%'}</strong>`;

  el.innerHTML = adjustCard + `
    <div class="metrics">
      <div class="metric">
        <div class="metric-label">Current week</div>
        <div class="metric-value">${ci.weekNum}</div>
        <div class="metric-sub">of 4-week cycle</div>
      </div>
      <div class="metric">
        <div class="metric-label">Week type</div>
        <div class="metric-value" style="font-size:1.4rem;padding-top:4px">${ci.isPeel ? 'Peel' : 'No Peel'}</div>
        <div class="metric-sub">${ci.isPeel ? 'Sunday peel night' : 'Sunday recovery night'}</div>
      </div>
      <div class="metric">
        <div class="metric-label">Retinol alternation</div>
        <div class="metric-value" style="font-size:1rem;padding-top:6px;line-height:1.3">${retinolStatus}</div>
      </div>
    </div>

    ${weeks.map((week, wi) => `
      <div style="margin-bottom:20px">
        <div style="font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mist);margin-bottom:8px">
          ${wi === 0 ? 'This week' : wi === 1 ? 'Next week' : `Week +${wi}`} &nbsp;·&nbsp; Week ${week.weekNum || '?'} ${week.isPeel ? '(Peel)' : '(No Peel)'}
        </div>
        <div class="cycle-row">
          ${week.days.map(({ date, info }) => {
            const isToday = date.getTime() === today.getTime();
            const routine = info?.routine;
            return `<div class="cycle-day${isToday ? ' today' : ''}${info?.isPeel ? ' peel-week' : ''}">
              <div class="cycle-day-name">${DAY_SHORT[date.getDay()]}</div>
              <div class="cycle-day-type">${routine ? routine.type : '—'}</div>
              <div class="cycle-day-sub">${routine ? routine.sub : ''}</div>
            </div>`;
          }).join('')}
        </div>
      </div>`).join('')}

    `;
}

function adjustCycleStart() {
  const val = document.getElementById('cycle-adjust-input').value;
  if (!val) return;
  settings.cycleStartDate = val;
  scheduleSave(); renderCycle();
}

// ── Tab: Products ─────────────────────────────────────────────────────────────
function renderProducts() {
  const el = document.getElementById('tab-content');
  const sv = (document.getElementById('prod-search') || {}).value || '';

  const groups = {
    'The Ordinary': products.filter(p => p.brand === 'The Ordinary'),
    'EltaMD': products.filter(p => p.brand === 'EltaMD'),
    'Colorescience': products.filter(p => p.brand === 'Colorescience'),
    'Nécessaire': products.filter(p => p.brand === 'Nécessaire'),
    'Chaddy Cosmetics': products.filter(p => p.brand === 'Chaddy Cosmetics'),
  };

  const depleting = products.filter(p => p.status === 'depleting').length;
  const depleted  = products.filter(p => p.status === 'depleted').length;
  const active    = products.filter(p => p.status === 'active').length;

  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Active</div><div class="metric-value">${active}</div></div>
      <div class="metric"><div class="metric-label">Depleting</div><div class="metric-value">${depleting}</div><div class="metric-sub">in use until gone</div></div>
      <div class="metric"><div class="metric-label">Depleted</div><div class="metric-value">${depleted}</div><div class="metric-sub">discontinued</div></div>
    </div>
    <div class="controls">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="prod-search" placeholder="Search products…" value="${esc(sv)}" oninput="renderProducts()">
      </div>
    </div>
    ${Object.entries(groups).map(([brand, items]) => {
      const filtered = items.filter(p => !sv || p.name.toLowerCase().includes(sv.toLowerCase()) || p.use.toLowerCase().includes(sv.toLowerCase()));
      if (!filtered.length) return '';
      return `<div class="product-section">
        <div class="product-section-title">${esc(brand)}</div>
        <div class="product-table-wrap">
          <table>
            <thead><tr><th>Product</th><th>Routine Use</th><th>Size</th><th>Status</th><th></th></tr></thead>
            <tbody>${filtered.map(p => `
              <tr>
                <td style="font-weight:500">${esc(p.name)}</td>
                <td style="color:var(--note);font-style:italic;font-size:.76rem">${esc(p.use)}</td>
                <td style="color:var(--mist)">${esc(p.size)}</td>
                <td><span class="badge b-${p.status}">${p.status === 'depleting' ? 'Depleting' : p.status === 'depleted' ? 'Depleted' : 'Active'}</span></td>
                <td>
                  ${p.status !== 'depleted' ? `<button class="toggle-btn" onclick="cycleProductStatus('${p.id}')">${p.status === 'active' ? 'Mark depleting' : p.status === 'depleting' ? 'Mark depleted' : ''}</button>` : `<button class="toggle-btn" onclick="cycleProductStatus('${p.id}')">Restore</button>`}
                </td>
              </tr>
              ${p.note ? `<tr><td colspan="5" style="padding:2px 14px 8px;color:var(--mist);font-size:.72rem;font-style:italic">${esc(p.note)}</td></tr>` : ''}
            `).join('')}</tbody>
          </table>
        </div>
      </div>`;
    }).join('')}`;
}

function cycleProductStatus(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  if (p.status === 'active') p.status = 'depleting';
  else if (p.status === 'depleting') p.status = 'depleted';
  else p.status = 'active';
  scheduleSave(); renderProducts();
}

// ── Tab: Log ──────────────────────────────────────────────────────────────────
function renderLog() {
  const el = document.getElementById('tab-content');
  const morningToday = isLoggedToday('morning');
  const eveningToday = isLoggedToday('evening');
  const weekStreak = calcStreak();

  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total entries</div><div class="metric-value">${log.length}</div></div>
      <div class="metric"><div class="metric-label">Evening streak</div><div class="metric-value">${weekStreak}</div><div class="metric-sub">consecutive days</div></div>
      <div class="metric">
        <div class="metric-label">Today</div>
        <div style="display:flex;gap:8px;margin-top:6px">
          <span class="badge ${morningToday ? 'b-active' : 'b-depleted'}">${morningToday ? '✓ AM' : '— AM'}</span>
          <span class="badge ${eveningToday ? 'b-active' : 'b-depleted'}">${eveningToday ? '✓ PM' : '— PM'}</span>
        </div>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div style="font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--mist)">Recent entries</div>
      <button class="btn-secondary" onclick="showAddLogEntry()">+ Add note</button>
    </div>
    ${log.length === 0 ? `<div class="empty-state">No log entries yet. Mark routines done on the Today tab.</div>` :
      log.slice(0, 40).map(e => `
        <div class="log-entry">
          <div class="log-date">${esc(e.date)}</div>
          <div class="log-meta">${e.session === 'morning' ? 'Morning' : 'Evening'} &nbsp;·&nbsp; ${esc(e.routine || '')}</div>
          ${e.note ? `<div class="log-note">${esc(e.note)}</div>` : ''}
          <div class="log-btn-row">
            <button class="btn-small" onclick="showEditLogEntry('${e.id}')">Edit note</button>
            <button class="btn-small danger" onclick="deleteLogEntry('${e.id}')">Remove</button>
          </div>
        </div>`).join('')}`;
}

function calcStreak() {
  // Count consecutive days with an evening entry
  const eveningDates = [...new Set(log.filter(e => e.session === 'evening').map(e => e.date))];
  const today = formatDateShort(todayDate());
  let streak = 0;
  let checkDate = new Date(todayDate());
  for (let i = 0; i < 60; i++) {
    const d = formatDateShort(checkDate);
    if (eveningDates.includes(d)) { streak++; checkDate.setDate(checkDate.getDate() - 1); }
    else if (i === 0) { checkDate.setDate(checkDate.getDate() - 1); } // allow today to be missing
    else break;
  }
  return streak;
}

function showAddLogEntry() {
  showModal('Add note', `
    <div class="form-row"><div class="form-label">Date</div><input type="date" id="f-date" value="${new Date().toISOString().split('T')[0]}"></div>
    <div class="form-row"><div class="form-label">Session</div><select id="f-session"><option value="evening">Evening</option><option value="morning">Morning</option></select></div>
    <div class="form-row"><div class="form-label">Note</div><textarea id="f-note" placeholder="Any observations, reactions, skin notes…"></textarea></div>
  `, () => {
    const note = document.getElementById('f-note').value.trim();
    if (!note) { alert('Note is required.'); return; }
    const dv = document.getElementById('f-date').value;
    const [y,mo,da] = dv.split('-');
    log.unshift({ id: uid(), date: `${parseInt(mo)}/${parseInt(da)}/${y}`, session: document.getElementById('f-session').value, routine: 'Note', note });
    scheduleSave(); closeModal(); renderLog();
  });
}

function showEditLogEntry(id) {
  const e = log.find(x => x.id === id);
  showModal('Edit note', `
    <div class="form-row"><div class="form-label">Note</div><textarea id="f-note">${esc(e.note || '')}</textarea></div>
  `, () => {
    e.note = document.getElementById('f-note').value.trim();
    scheduleSave(); closeModal(); renderLog();
  });
}

function deleteLogEntry(id) {
  if (!confirm('Remove this entry?')) return;
  log = log.filter(e => e.id !== id);
  scheduleSave(); renderLog();
}

// ── Modal ─────────────────────────────────────────────────────────────────────
let modalCallback = null;
function showModal(title, body, onSave) {
  modalCallback = onSave;
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <div class="modal-title">${esc(title)}</div>
        ${body}
        <div class="modal-footer">
          <button class="btn-secondary" onclick="closeModal()">Cancel</button>
          <button class="btn-primary" onclick="modalCallback&&modalCallback()">Save</button>
        </div>
      </div>
    </div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; modalCallback = null; }

// ── Tab routing ───────────────────────────────────────────────────────────────
let currentTab = 'today';
function showTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  if (el) el.classList.add('active');
  render();
}
function render() {
  if (currentTab === 'today')    renderToday();
  else if (currentTab === 'cycle')    renderCycle();
  else if (currentTab === 'products') renderProducts();
  else if (currentTab === 'log')      renderLog();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
window.addEventListener('beforeunload', e => { if (saveTimer) { e.preventDefault(); e.returnValue = ''; } });

render();
</script>
